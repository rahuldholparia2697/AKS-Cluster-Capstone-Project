name: 'Build and push docker image to ACR USING PE'

on:
  workflow_dispatch:
  # push:
  #   branches: ['master']
  #   paths:
  #     - 'E-Commerce-Web-App/src/product-catalog/**'

env:
  ARM_USE_MSI: true
  ARM_SUBSCRIPTION_ID: 'b786f7c3-60f5-4584-ada7-b5d56c7d64fa'
  ARM_TENANT_ID: 'b596b51c-3743-4440-8658-e5645145566c'

defaults:
  run:
    working-directory: ./E-Commerce-Web-App/src/product-catalog/

jobs:
  plan:
    name: 'Docker build and push'
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Azure Login
        uses: azure/login@v2
        with:
          # Uses the VM's system-assigned identity to login
          auth-type: IDENTITY
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Docker installation
        run: |
          sudo apt update
          sudo apt install ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          sudo tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF

          sudo apt update

          sudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

          sudo usermod -aG docker $USER

      - name: Login to ACR
        run: |
          az acr login --name acraksp12345

      - name: Set image tag
        id: vars
        run: |
          IMAGE_TAG=${GITHUB_SHA::7}
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build Docker and push image
        run: |
          docker build -t acraksp12345.azurecr.io/product-catalog:${{ steps.vars.outputs.tag }} .
          docker push acraksp12345.azurecr.io/product-catalog:${{ steps.vars.outputs.tag }}

      - name: updating kubernetes manifest files
        env:
          GITHUB_TOKEN: ${{ secrets.MY_PAT }}
        run: |
          #!/bin/bash

          set -x

          # Set the repository URL
          REPO_URL="https://${GITHUB_TOKEN}@github.com/rahuldholparia2697/AKS-Cluster-Capstone-Project"

          rm -rf /tmp/temp_repo

          # Clone the git repository into the /tmp directory
          git clone "$REPO_URL" /tmp/temp_repo

          # Navigate into the cloned repository directory
          cd /tmp/temp_repo

          # Make changes to the Kubernetes manifest file(s)
          # For example, let's say you want to change the image tag in a deployment.yaml file
          sed -i "s|image:.*|image: acraksp12345.azurecr.io/product-catalog:${{ steps.vars.outputs.tag }}|g" E-Commerce-Web-App/kubernetes-manifests/productcatalog/deploy.yaml

          # Add the modified files
          git add .

          # Commit the changes
          git commit -m "Update Kubernetes manifest"

          # Push the changes back to the repository
          git push

          # Cleanup: remove the temporary directory
          rm -rf /tmp/temp_repo
